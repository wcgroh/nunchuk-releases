  name: Build Mac
  on:
    workflow_dispatch:
    push:
      tags: ['v*']

  jobs:
    build:
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.13'

        - name: Install dependencies
          run: |
            pip install \
              PyQt6 pandas cryptography keyring requests requests-oauthlib \
              lxml openpyxl python-dateutil google-api-python-client \
              google-auth-oauthlib pyspellchecker rsa pyinstaller

        - name: Build app
          run: python build_app.py

        - uses: actions/upload-artifact@v4
          with:
            name: Nunchuk-mac
            path: dist/*.zip
